<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | LBSB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path fill='%231e1914' d='M16 28c0 0-1-1-1-2s1-2 1-2V20c-3 0-6 2-8 4l1-5c1-2 4-3 7-3V12c-2-1-3-3-3-5 0 0 2 1 3 3V6c0-2 0-4 0-4s0 2 0 4v4c1-2 3-3 3-3 0 2-1 4-3 5v4c3 0 6 1 7 3l1 5c-2-2-5-4-8-4v4s1 1 1 2-1 2-1 2z'/></svg>">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(to bottom, #fafafa 0%, #f5f5f0 100%);
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: rgba(30, 25, 20, 0.9);
        }
        
        .container {
            text-align: center;
            padding: 40px;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 20px;
            opacity: 0.15;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 15px;
        }
        
        p {
            font-size: 16px;
            color: rgba(60, 55, 50, 0.8);
            margin-bottom: 30px;
        }
        
        .home-link {
            display: inline-block;
            padding: 12px 30px;
            background: rgba(30, 25, 20, 0.85);
            color: #fdfcfa;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            clip-path: polygon(
                0 0,
                calc(100% - 12px) 0,
                100% 12px,
                100% 100%,
                12px 100%,
                0 calc(100% - 12px)
            );
            transition: all 0.3s ease;
        }
        
        .home-link:hover {
            background: rgba(30, 25, 20, 1);
        }
        
        /* Simple tree illustration */
        .tree-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 30px;
            opacity: 0.6;
        }
        
        @media (max-width: 768px) {
            .error-code {
                font-size: 80px;
            }
            h1 {
                font-size: 22px;
            }
            p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <svg class="tree-icon" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <path fill="rgba(30, 25, 20, 0.9)" d="M16 28c0 0-1-1-1-2s1-2 1-2V20c-3 0-6 2-8 4l1-5c1-2 4-3 7-3V12c-2-1-3-3-3-5 0 0 2 1 3 3V6c0-2 0-4 0-4s0 2 0 4v4c1-2 3-3 3-3 0 2-1 4-3 5v4c3 0 6 1 7 3l1 5c-2-2-5-4-8-4v4s1 1 1 2-1 2-1 2z"/>
        </svg>
        
        <div class="error-code">404</div>
        
        <h1>Page Not Found</h1>
        
        <p>The page you're looking for seems to have wandered off.<br>Let's get you back on track.</p>
        
        <a href="index.html" class="home-link">Return Home</a>
    </div>
</body>
</html>
